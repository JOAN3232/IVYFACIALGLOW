<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/favicon-32.png" />
  <link rel="icon" type="image/svg+xml" href="images/icons/ivy-app-icon.svg" />
  <link rel="apple-touch-icon" href="images/icons/ivy-app-icon-192.png" />
  <title>Admin Orders | IvyFacialGlow</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 248, 249, 0.95), rgba(255, 255, 255, 0.98) 42%),
        #fffafa;
    }

    .display-font {
      font-family: "Playfair Display", serif;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(234, 217, 221, 0.95);
      box-shadow: 0 18px 45px rgba(92, 74, 74, 0.07);
      backdrop-filter: blur(16px);
    }

    .stat-card {
      position: relative;
      overflow: hidden;
      border-radius: 1.5rem;
      background: #ffffff;
      border: 1px solid #ead9dd;
      box-shadow: 0 12px 35px rgba(92, 74, 74, 0.06);
    }

    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--accent, #d89ca4);
    }

    .admin-actions-menu {
      display: none;
      gap: 0.22rem;
      flex-direction: column;
    }

    .admin-actions-menu::before,
    .admin-actions-menu::after,
    .admin-actions-menu .hamburger-line {
      content: "";
      display: block;
      width: 1.15rem;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    @media (max-width: 639px) {
      .admin-actions {
        display: none;
      }

      .admin-actions.is-open {
        display: grid;
      }

      .admin-actions-menu {
        display: inline-flex;
      }
    }
  </style>
</head>

<body class="admin-page text-[#5C4A4A]">
  <div class="min-h-screen">
    <header class="sticky top-0 z-50 border-b border-[#ead9dd] bg-white/85 backdrop-blur-xl">
      <div class="max-w-7xl mx-auto px-5 md:px-8 py-4">
        <div class="flex items-center justify-between gap-4">
          <div class="min-w-0">
            <p class="text-[11px] uppercase tracking-[0.28em] text-[#b98a92] mb-1">
              IvyFacialGlow Studio
            </p>
            <h1 class="display-font text-2xl md:text-3xl text-[#5C4A4A]">
              Admin Orders
            </h1>
          </div>

          <button
            id="adminActionsMenuBtn"
            type="button"
            class="admin-actions-menu shrink-0 w-11 h-11 rounded-full border border-[#ead9dd] bg-white items-center justify-center text-[#5C4A4A] hover:bg-[#fff1f3] transition"
            aria-label="Open admin actions"
            aria-expanded="false"
          >
            <span class="hamburger-line"></span>
          </button>
        </div>

        <div
          id="adminActions"
          class="admin-actions mt-4 sm:mt-0 sm:flex sm:items-center sm:justify-end gap-3 grid-cols-1"
        >
          <a
            href="admin-dashboard.html"
            class="w-full sm:w-auto text-center px-4 md:px-5 py-2.5 rounded-full border border-[#ead9dd] bg-white text-sm font-medium hover:bg-[#fff1f3] transition"
          >
            Products
          </a>

          <button
            type="button"
            data-theme-toggle
            class="w-full sm:w-auto px-4 md:px-5 py-2.5 rounded-full border border-[#ead9dd] bg-white text-sm font-medium hover:bg-[#fff1f3] transition"
          >
            Dark Mode
          </button>

          <button
            id="adminLogoutBtn"
            type="button"
            class="w-full sm:w-auto px-4 md:px-5 py-2.5 rounded-full border border-[#ead9dd] bg-white text-sm font-medium hover:bg-[#fff1f3] transition"
          >
            Admin Logout
          </button>

          <a
            href="index.html"
            class="w-full sm:w-auto text-center px-4 md:px-5 py-2.5 rounded-full bg-[#5C4A4A] text-white text-sm font-medium hover:bg-[#d89ca4] transition"
          >
            Store
          </a>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-5 md:px-8 py-8 md:py-10">
      <section class="glass-panel rounded-[1.75rem] p-6 md:p-8 mb-8">
        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
          <div class="max-w-2xl">
            <p class="text-sm font-medium text-[#b98a92] mb-3">
              Order Desk
            </p>
            <h2 class="display-font text-4xl md:text-5xl leading-tight text-[#5C4A4A] mb-4">
              Review payments and move orders through delivery.
            </h2>
            <p class="text-sm md:text-base leading-7 text-[#7A6A6A]">
              Confirm transfers, approve orders, and update customers as each order moves forward.
            </p>
          </div>

          <div class="grid grid-cols-3 gap-3 w-full lg:w-[420px]">
            <div class="stat-card p-5" style="--accent:#d89ca4;">
              <p class="text-xs uppercase tracking-[0.18em] text-[#9b8a8a] mb-3">Total</p>
              <h3 id="totalOrders" class="text-3xl font-semibold text-[#d89ca4]">0</h3>
            </div>

            <div class="stat-card p-5" style="--accent:#e8b84f;">
              <p class="text-xs uppercase tracking-[0.18em] text-[#9b8a8a] mb-3">Pending</p>
              <h3 id="pendingOrders" class="text-3xl font-semibold text-yellow-500">0</h3>
            </div>

            <div class="stat-card p-5" style="--accent:#5fb985;">
              <p class="text-xs uppercase tracking-[0.18em] text-[#9b8a8a] mb-3">Approved</p>
              <h3 id="approvedOrders" class="text-3xl font-semibold text-green-600">0</h3>
            </div>
          </div>
        </div>
      </section>

      <section class="glass-panel rounded-[1.75rem] p-6 md:p-7">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-5">
          <div>
            <p class="text-xs uppercase tracking-[0.22em] text-[#b98a92] mb-2">
              Customer Orders
            </p>
            <h2 class="display-font text-3xl text-[#5C4A4A]">
              Orders
            </h2>
          </div>
        </div>

        <div id="ordersContainer" class="grid gap-5"></div>
      </section>
    </main>
  </div>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
